name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build web app
        run: npm run build

      - name: Initialize Capacitor if needed
        run: |
          if [ ! -f capacitor.config.json ]; then
            npx cap init Zerotonine com.iagames.zerotonine --web-dir=dist
          fi

      - name: Add Android platform if needed
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Force Kotlin version
        run: |
          cat >> android/build.gradle <<'EOF'

          configurations.all {
              resolutionStrategy {
                  force "org.jetbrains.kotlin:kotlin-stdlib:1.8.22"
                  force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22"
                  force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22"
              }
          }
          EOF

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zerotonine-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk